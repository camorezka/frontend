<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>LEONARDO GAME — Главное</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>

<!-- КАПЧА при первом входе -->
<script>
(function() {
  if (localStorage.getItem("lgCaptchaPassed") !== "1") {
    // Покажем капчу — но DOM ещё не загружен, откладываем до DOMContentLoaded
    window.__needCaptcha = true;
  }
})();
</script>
<style>
  .home-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 16px;
  }
  .home-logo {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(22px, 6vw, 28px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .home-logo-sub {
    font-size: 13px;
    color: var(--sub);
    text-align: center;
    margin-top: 8px;
  }
  .home-soon {
    margin-top: 32px;
    padding: 18px 28px;
    background:
      linear-gradient(
        135deg,
        rgba(255,255,255,0.12) 0%,
        rgba(255,255,255,0.04) 50%,
        rgba(255,255,255,0.08) 100%
      );
    border: 1px solid rgba(255,255,255,0.20);
    border-top-color: rgba(255,255,255,0.35);
    border-radius: 18px;
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.22);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .home-soon::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
    pointer-events: none;
    border-radius: 18px 18px 0 0;
  }
  .home-soon-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .home-soon-text {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="screen active" id="screen-home" style="display:flex; justify-content:space-between;">

  <!-- КОНТЕНТ -->
  <div class="home-content">
    <div>
      <div class="home-logo">LEONARDO GAME</div>
      <div class="home-logo-sub">Выигрывай крутые подарки вместе с нами</div>
    </div>
    <div class="home-soon">
      <div class="home-soon-label">Скоро</div>
      <div class="home-soon-text">Здесь появятся новости,<br>акции и специальные события</div>
    </div>
  </div>

  <!-- НИЖНЯЯ НАВИГАЦИЯ — СТЕКЛЯННАЯ -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-tab active" id="nav-home">
      <span class="nav-icon">🏠</span>
      <span>Главное</span>
    </a>
    <a href="index.html" class="nav-tab" id="nav-spin">
      <span class="nav-icon">🎰</span>
      <span>Крутить</span>
    </a>
    <a href="profile.html" class="nav-tab" id="nav-profile">
      <span class="nav-icon">👤</span>
      <span>Профиль</span>
    </a>
  </nav>

</div>

<!-- КАПЧА — модальная стеклянная панель -->
<div id="captcha-modal" class="captcha-modal">
  <div class="captcha-glass-panel">
    <div class="captcha-icon">🔐</div>
    <div class="captcha-title">Проверка</div>
    <div class="captcha-sub">Подтверди что ты не бот</div>
    <div class="captcha-question" id="captcha-question">?</div>
    <div class="captcha-options" id="captcha-options"></div>
    <div class="captcha-error" id="captcha-error"></div>
  </div>
</div>

<script>
(function() {
  if (!window.__needCaptcha) return;

  function showHomeCaptcha() {
    var a = Math.floor(Math.random() * 9) + 1;
    var b = Math.floor(Math.random() * 9) + 1;
    var correct = a + b;
    var wrong = [];
    while (wrong.length < 3) {
      var w = correct + (Math.floor(Math.random() * 7) - 3);
      if (w !== correct && w > 0 && wrong.indexOf(w) === -1) wrong.push(w);
    }
    var options = [correct].concat(wrong).sort(function() { return Math.random() - 0.5; });

    var qEl = document.getElementById("captcha-question");
    var oEl = document.getElementById("captcha-options");
    var eEl = document.getElementById("captcha-error");
    if (qEl) qEl.textContent = a + " + " + b + " = ?";
    if (eEl) eEl.textContent = "";

    if (oEl) {
      oEl.innerHTML = options.map(function(v) {
        return '<button class="captcha-btn" data-val="' + v + '">' + v + '</button>';
      }).join("");

      var handled = false;
      oEl.querySelectorAll(".captcha-btn").forEach(function(btn) {
        function tryAnswer() {
          if (handled) return;
          handled = true;
          var val = parseInt(btn.getAttribute("data-val"));
          if (val === correct) {
            btn.classList.add("correct");
            localStorage.setItem("lgCaptchaPassed", "1");
            setTimeout(function() {
              var modal = document.getElementById("captcha-modal");
              if (modal) modal.classList.remove("active");
            }, 120);
          } else {
            btn.classList.add("wrong");
            if (eEl) eEl.textContent = "Неверно! Попробуй ещё раз.";
            setTimeout(function() { showHomeCaptcha(); }, 500);
          }
        }
        btn.addEventListener("touchstart", function(e) { e.preventDefault(); tryAnswer(); }, { passive: false });
        btn.onclick = tryAnswer;
      });
    }

    var modal = document.getElementById("captcha-modal");
    if (modal) modal.classList.add("active");
  }

  document.addEventListener("DOMContentLoaded", function() {
    showHomeCaptcha();
  });
})();
</script>
</body>
</html>
